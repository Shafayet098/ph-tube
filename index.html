<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH-Tube-Project</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .active {
            background-color: #FF1F3D;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <nav class="container mx-auto flex justify-between py-5 border-b-2 border-[#17171720]">
            <div>
                <img class="w-[150px]" src="./assets/Logo.png" alt="">
            </div>
            <div>
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search_input" type="search" required placeholder="Search" />
                </label>
            </div>
            <div>
                <button class="btn btn-secondary">Sort By View</button>
            </div>
        </nav>
    </header>
    <nav id="categories-container" class="flex justify-center gap-5 py-6">
        <div>
            <button id="btn-all" onclick="loadVideos()"
                class="btn btn-sm hover:bg-[#FF1F3D] hover:text-white">All</button>
        </div>

    </nav>
    <section id="loader" class="text-center pt-10 hidden">
        <span class="loading loading-dots loading-xl"></span>
    </section>
    <section id="video-container" class="w-11/12 mx-auto grid grid-cols-4 gap-5">
        <div class="col-span-full text-center flex flex-col items-center justify-center pt-12">
            <img class="w-[120px]" src="./assets/Icon.png" alt="">
            <h2 class="font-bold text-2xl">Oops!! Sorry, There is no content here</h2>
        </div>
    </section>


    <!-- Open the modal using ID.showModal() method -->
    <dialog id="modal_dialog" class="modal">
        <div class="modal-box">
            <div id="details_container">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    <script src="./javascript/index.js"></script>
</body>

</html>
